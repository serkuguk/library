<div class="password-wrapper">
  <p-floatlabel>
    <p-password
         type="text"
         class="password-input"
         [disabled]="isDisabled"
         (keyup)="onKeyup($event)"
         (blur)="onBlur()"
         [inputId]="labelType()"
         [(ngModel)]="value"
         [feedback]="feedback()"
         [toggleMask]="toggleMask()"
    />
    <label for="labelType()">{{ placeholder() }}</label>
  </p-floatlabel>
</div>
