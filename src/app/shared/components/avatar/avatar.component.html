@if (iconType() === 'icon') {
  <p-avatar
       [icon]="icon()"
       [class]="className()"
       [size]="size()"
       [shape]="shape()"
       [label]="label()"
  />
}

@if (iconType() === 'image' && !overlayBadge()) {
  <p-avatar
       [image]="imageUrl()"
       [class]="className()"
       [size]="size()"
       [shape]="shape()"
       [label]="label()"
  />
}

@if (iconType() === 'image' && overlayBadge()) {
  <p-overlay-badge value="5" severity="danger" class="inline-flex">
    <p-avatar
         [image]="imageUrl()"
         [class]="className()"
         [size]="size()"
         [shape]="shape()"
         [label]="label()"
    />
  </p-overlay-badge>
}
